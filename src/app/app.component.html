<mat-sidenav-container>

    <!-- otvoren sidenav -->
    <mat-sidenav #sidenav opened="true">
        <mat-nav-list>
            <a mat-list-item routerLink="/signup" (click)="sidenav.close()">
                <mat-icon>person</mat-icon>
                Signup
            </a>

            <a mat-list-item routerLink="/login" (click)="sidenav.close()">
                <mat-icon>input</mat-icon>
                Login
            </a>

            <a mat-list-item routerLink="/proizvodi" (click)="sidenav.close()">
                <mat-icon>apparel</mat-icon>
                Proizvodi
            </a>
            
            <a mat-list-item routerLink="/" (click)="sidenav.close(); logout()">
                <mat-icon>logout</mat-icon>
                Logout
            </a>
        </mat-nav-list>
    </mat-sidenav>

    <!-- sidenav / toolbar itd -->
    <mat-sidenav-content>

        <mat-toolbar color="primary">

            <div>
                <button mat-raised-button color="primary"(click)="sidenav.toggle()">
                    <mat-icon>list</mat-icon>
                </button>
            </div>

            <div>
                <a routerLink="/">Logo</a>
            </div>

            <div fxFlex fxLayoutAlign="end" fxLayoutGap="12px" fxHide.xs>
                <a routerLink="/signup">Signup</a>
                <a routerLink="/login">Login</a>
                <a routerLink="/proizvodi">Proizvodi</a>
                <a routerLink="/korpa"><mat-icon matBadge="{{ getTotalItems() }}">shopping_cart</mat-icon></a>
                <button mat-raised-button color="primary"
        [disabled]="!this.userService.currentUser"
        (click)="openProfile(this.userService.currentUser?.id)">
  {{ this.userService.currentUser?.email || 'not logged in' }}
</button>


            </div>
        </mat-toolbar>

        <router-outlet></router-outlet>
    </mat-sidenav-content>

</mat-sidenav-container>
